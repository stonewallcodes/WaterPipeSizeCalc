<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Water Pipe Sizing Calculator</title>
    <style>
        :root { --primary: #2d6a4f; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; padding: 1.5rem; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); border-top: 8px solid var(--primary); }
        h1 { margin-top: 0; color: var(--primary); font-size: 1.4rem; margin-bottom: 0.5rem; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
        .field { display: flex; flex-direction: column; margin-bottom: 0.75rem; }
        label { font-size: 0.85rem; font-weight: 600; margin-bottom: 0.25rem; color: #475569; }
        input, select { padding: 0.6rem; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 1rem; background: white; }
        button { width: 100%; background: var(--primary); color: white; border: none; padding: 0.9rem; border-radius: 6px; font-weight: 600; cursor: pointer; margin-top: 1rem; transition: background 0.2s; }
        button:hover { background: #1b4332; }
        #results { margin-top: 1.5rem; padding: 1.25rem; border-radius: 8px; display: none; background: #f0fdf4; border: 1px solid #bbf7d0; }
        .res-row { display: flex; justify-content: space-between; padding: 0.4rem 0; border-bottom: 1px solid #dcfce7; }
        .res-row:last-child { border-bottom: none; }
        .error { background: #fef2f2 !important; border-color: #fecaca !important; color: #991b1b; }
        .hint { font-size: 0.75rem; color: #64748b; font-weight: normal; }
    </style>
</head>
<body>

<div class="container">
    <h1>Water Pipe Sizing & Pressure Loss Calculator</h1>
    <h4>Ideal For Residential Plumbing and Irrigation Systems.</h4>
    
    <div class="field">
        <label>Pipe Material (C-Factor)</label>
        <select id="material" onchange="updateCFactor()"></select>
    </div>

    <div class="grid">
        <div class="field">
            <label>Current C-Factor</label>
            <input type="number" id="cVal" readonly style="background: #f1f5f9; color: #64748b;">
        </div>
        <div class="field">
            <label>Pipe Length (Feet)</label>
            <input type="number" id="length" value="100">
        </div>
        <div class="field">
            <label>Elevation Change (Feet) <br><span class="hint">(+ for Uphill, - for Downhill)</span></label>
            <input type="number" id="elevation" value="0">
        </div>
        <div class="field">
            <label>Flow Rate (GPM)</label>
            <input type="number" id="flow" value="10" step="0.5">
        </div>
        <div class="field">
            <label>Static Start PSI</label>
            <input type="number" id="startP" value="60">
        </div>
        <div class="field">
            <label>Min Required PSI (Output)</label>
            <input type="number" id="minP" value="40">
        </div>
        <div class="field">
            <label>Max Velocity (FPS)</label>
            <input type="number" id="maxV" value="10">
        </div>
    </div>

    <button onclick="calculate()">Calculate Recommended Size</button>

    <div id="results"></div>
     
    <p style="font-size: 0.7rem; margin-top: 20px; color: #64748b;">
    Disclaimer: This tool is a mathematical model based on the Hazen-Williams Formula and is for preliminary analysis only. Elevation loss is calculated at 0.433 PSI per foot.
    </p>
</div>

<script>
const pipeData = [
    { type: "PEX / CTS Poly Pipe (SDR 9)", c: 150, sizes: [
        { id: 0.475, name: "1/2\" PEX or Poly" }, { id: 0.671, name: "3/4\" PEX or Poly" }, { id: 0.875, name: "1\" PEX or Poly" },
        { id: 1.135, name: "1-1/4\" PEX or Poly" }, { id: 1.328, name: "1-1/2\" PEX or Poly" }, { id: 1.623, name: "2\" PEX or Poly" }
    ]},
    { type: "IPS Poly SDR 11", c: 150, sizes: [
        { id: 0.671, name: "1/2\" Poly" }, { id: 0.860, name: "3/4\" Poly" }, { id: 1.075, name: "1\" Poly" },
        { id: 1.358, name: "1 1/4\" Poly" }, { id: 1.554, name: "1 1/2\" Poly" }, { id: 1.943, name: "2\" Poly" }
    ]},
    { type: "PVC Schedule 40", c: 150, sizes: [
        { id: 0.622, name: "1/2\" PVC" }, { id: 0.824, name: "3/4\" PVC" }, { id: 1.029, name: "1\" PVC" },
        { id: 1.360, name: "1 1/4\" PVC" }, { id: 1.590, name: "1 1/2\" PVC" }, { id: 2.047, name: "2\" PVC" }
    ]},
    { type: "PVC Schedule 80", c: 150, sizes: [ 
        { id: 0.526, name: "1/2\" SCH 80 PVC" }, { id: 0.722, name: "3/4\" SCH 80 PVC" }, { id: 0.936, name: "1\" SCH 80 PVC" }, 
        { id: 1.255, name: "1 1/4\" SCH 80 PVC" }, { id: 1.476, name: "1 1/2\" SCH 80 PVC" }, { id: 1.913, name: "2\" SCH 80 PVC" } 
    ]},
    { type: "Copper Type L", c: 140, sizes: [
        { id: 0.545, name: "1/2\" Copper" }, { id: 0.785, name: "3/4\" Copper" }, { id: 1.025, name: "1\" Copper" },
        { id: 1.265, name: "1 1/4\" Copper" }, { id: 1.505, name: "1 1/2\" Copper" }, { id: 1.939, name: "2\" Copper" }
    ]},
    { type: "Galvanized Steel", c: 100, sizes: [
        { id: 0.622, name: "1/2\" Steel" }, { id: 0.824, name: "3/4\" Steel" }, { id: 1.049, name: "1\" Steel" },
        { id: 1.660, name: "1 1/4\" Steel" }, { id: 1.900, name: "1 1/2\" Steel" }, { id: 2.067, name: "2\" Steel" }
    ]},
    { type: "Drip Tube (Polyethylene)", c: 140, sizes: [ 
        { id: 0.170, name: "1/4\" Micro-Tubing" }, { id: 0.600, name: "1/2\" Poly Tubing" }, 
        { id: 0.820, name: "3/4\" Poly Tubing" }, { id: 1.050, name: "1\" Poly Tubing" } 
    ]},
];

const selectEl = document.getElementById('material');
pipeData.forEach((item, index) => {
    let opt = document.createElement('option');
    opt.value = index;
    opt.textContent = item.type;
    selectEl.appendChild(opt);
});

function updateCFactor() {
    const material = pipeData[selectEl.value];
    document.getElementById('cVal').value = material.c;
}

updateCFactor();

function calculate() {
    const material = pipeData[selectEl.value];
    const L = parseFloat(document.getElementById('length').value);
    const elevChange = parseFloat(document.getElementById('elevation').value) || 0;
    const Q = parseFloat(document.getElementById('flow').value);
    const startP = parseFloat(document.getElementById('startP').value);
    const minP = parseFloat(document.getElementById('minP').value);
    const maxV = parseFloat(document.getElementById('maxV').value);
    const C = material.c;
    
    const resDiv = document.getElementById('results');
    resDiv.className = ""; 
    let found = null;

    // Elevation PSI change: gain height = lose pressure. 
    // 1 foot vertical = 0.433 PSI
    const elevPsiAdjustment = elevChange * 0.433;

    for (let pipe of material.sizes) {
        // Velocity (FPS) = (0.4085 * GPM) / d^2
        let vel = (0.4085 * Q) / Math.pow(pipe.id, 2);
        
        if (vel <= maxV) {
            // Friction Head Loss (Feet) using Hazen-Williams
            let frictionHeadLoss = (10.67 * L * Math.pow(Q, 1.852)) / (Math.pow(C, 1.852) * Math.pow(pipe.id, 4.87));
            let frictionPsiLoss = frictionHeadLoss * 0.433;
            
            let totalPsiLoss = frictionPsiLoss + elevPsiAdjustment;
            let finalP = startP - totalPsiLoss;

            if (finalP >= minP) {
                found = { 
                    ...pipe, 
                    vel, 
                    frictionPsiLoss, 
                    elevPsiAdjustment, 
                    totalPsiLoss, 
                    finalP 
                };
                break;
            }
        }
    }

    resDiv.style.display = "block";
    if (found) {
        const elevText = found.elevPsiAdjustment >= 0 ? "Loss" : "Gain";
        resDiv.innerHTML = `
            <strong style="color:var(--primary); font-size:1.1rem;">Recommended Size: ${found.name}</strong>
            <div class="res-row"><span>Velocity:</span> <span>${found.vel.toFixed(2)} ft/s</span></div>
            <div class="res-row"><span>Friction Loss:</span> <span>${found.frictionPsiLoss.toFixed(2)} PSI</span></div>
            <div class="res-row"><span>Elevation ${elevText}:</span> <span>${Math.abs(found.elevPsiAdjustment).toFixed(2)} PSI</span></div>
            <div class="res-row" style="border-top: 1px solid #aaa; font-weight:bold;"><span>Outlet Pressure:</span> <span>${found.finalP.toFixed(2)} PSI</span></div>
        `;
    } else {
        resDiv.classList.add("error");
        resDiv.innerHTML = `<strong>Error:</strong> No pipe size found. Try a larger material, higher start pressure, or lower flow rate. <br><br><small>Final pressure would be below ${minP} PSI or velocity above ${maxV} FPS.</small>`;
    }
}
</script>
</body>
</html>
